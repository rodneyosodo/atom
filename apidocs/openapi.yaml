# Tags
# ---------------------------------------------------------------------------
tags:
  - name: Health
    description: Service liveness
  - name: Auth
    description: Login, logout, session management, JWKS, and key rotation
  - name: Entities
    description: Principal management — humans, devices, services, workloads, applications
  - name: Credentials
    description: Password and API key credential lifecycle
  - name: Groups
    description: Named collections of entities used as policy subjects
  - name: Ownerships
    description: Parent–child relationships between entities
  - name: Resources
    description: Protected resources registered for authorization decisions
  - name: Tenants
    description: First-class tenant boundaries — Magistrala domains map here
  - name: Roles
    description: Named capability bundles for RBAC
  - name: Capabilities
    description: Atomic permissions — seeded defaults plus custom additions
  - name: Policies
    description: Policy bindings — the core authorization primitive (RBAC + ABAC)
  - name: Authorization
    description: Runtime authorization decisions from the PDP
