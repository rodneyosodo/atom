      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updateEntity
      summary: Update an entity
      description: All fields are optional; only provided fields are updated (COALESCE semantics).
      tags: [Entities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntity'
      responses:
        "200":
          description: Updated entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteEntity
      summary: Delete an entity
      description: >
        An entity may always delete itself.
        Deleting any other entity requires `manage` scope=all (**RequireManage**).
