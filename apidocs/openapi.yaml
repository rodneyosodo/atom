openapi: 3.0.3

info:
  title: Atom
  version: 0.1.0
  description: |
    Identity and Authorization service for IoT and cloud-native systems.

    All endpoints except `GET /health`, `POST /auth/login`, and
    `GET /.well-known/jwks.json` require a Bearer token:

    ```
    Authorization: Bearer <token>
    ```

    Two token types are accepted:
    - **JWT** (`eyJ...`) — returned by `/auth/login`, short-lived (default 1 h)
    - **API key** (`atom_...`) — long-lived, created per entity

    Endpoints marked **RequireManage** additionally require the caller to hold an
    `allow` + `scope=all` policy binding covering the `manage` capability.
  license:
    name: Apache-2.0

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

# ---------------------------------------------------------------------------
# Reusable components
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT (`eyJ...`) or API key (`atom_<id>_<secret>`)

  # ── Schemas ──────────────────────────────────────────────────────────────

  schemas:

    # Enumerations
    EntityKind:
      type: string
      enum: [human, device, service, workload, application]

    EntityStatus:
      type: string
      enum: [active, inactive, suspended]
      default: active

    ProfileStatus:
      type: string
      enum: [active, deprecated, disabled]
      default: active

    ProfileVersionStatus:
      type: string
      enum: [draft, active, deprecated, disabled]
      default: active

    CredentialKind:
      type: string
      enum: [password, api_key, certificate]

    CredentialStatus:
      type: string
      enum: [active, revoked]

    SubjectKind:
      type: string
      enum: [entity, group]

    GrantKind:
      type: string
      enum: [capability, role]

    ScopeKind:
      type: string
      enum: [all, resource_kind, resource]
      description: |
        - `all` — applies to every resource
        - `resource_kind` — applies to all resources of a given kind (`scope_ref` = kind name)
        - `resource` — applies to one specific resource (`scope_ref` = resource UUID)

    Effect:
      type: string
      enum: [allow, deny]
      default: allow

    # Shared error envelope
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: not found

    # ── Auth ───────────────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [identifier, secret]
      properties:
        identifier:
          type: string
          example: alice
        secret:
          type: string
          format: password
        kind:
          $ref: '#/components/schemas/CredentialKind'
          default: password

    LoginResponse:
      type: object
      required: [token, entity_id, session_id, expires_at]
      properties:
        token:
          type: string
          description: ES256-signed JWT
        entity_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time

    Session:
      type: object
      required: [id, entity_id, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Jwk:
      type: object
      required: [kty, crv, x, y, kid, use, alg]
      properties:
        kty:
          type: string
          example: EC
        crv:
          type: string
          example: P-256
        x:
          type: string
          description: Base64url-encoded x coordinate
        y:
          type: string
          description: Base64url-encoded y coordinate
        kid:
          type: string
          description: Key ID — matches the `kid` header in signed JWTs
        use:
          type: string
          example: sig
        alg:
          type: string
          example: ES256

    JwksResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/Jwk'
          description: Primary key first, standby key second (if present)

    # ── Entities ───────────────────────────────────────────────────────────

    Entity:
      type: object
      required: [id, kind, name, status, attributes, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: '#/components/schemas/EntityKind'
        name:
          type: string
        tenant_id:
          type: string
          format: uuid
          nullable: true
        profile_id:
          type: string
          format: uuid
          nullable: true
          description: User/domain profile. Authorization still uses `kind`.
        profile_version_id:
          type: string
          format: uuid
          nullable: true
          description: Profile version used to validate `attributes`.
        status:
          $ref: '#/components/schemas/EntityStatus'
        attributes:
          type: object
          description: Arbitrary JSONB metadata, usable in ABAC conditions
          example: {"department": "engineering", "env": "prod"}
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEntity:
      type: object
      required: [name]
      description: >
        Provide either `kind` for legacy/internal creation, or `profile_id` to derive
        the internal Atom kind from an active entity profile. `profile_version_id`
        is optional when `profile_id` is present; Atom uses the active version
        when omitted.
      properties:
        kind:
          $ref: '#/components/schemas/EntityKind'
        profile_id:
          type: string
          format: uuid
        profile_version_id:
          type: string
          format: uuid
        name:
          type: string
          example: sensor-01
        tenant_id:
          type: string
          format: uuid
        attributes:
          type: object

    UpdateEntity:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/EntityStatus'
        attributes:
          type: object
          description: Replaces all existing attributes when provided

    EntityList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Entity'
        total:
          type: integer
          description: Total count across all pages

    # ── Profiles ───────────────────────────────────────────────────────────

    Profile:
      type: object
      required: [id, object_kind, kind, key, display_name, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          nullable: true
        object_kind:
          type: string
          enum: [entity, resource, group, tenant, credential]
        kind:
          type: string
          description: Internal object kind value. Entity profiles must use an EntityKind.
          example: device
        key:
          type: string
          description: User/domain subtype key.
          example: client
        display_name:
          type: string
          example: Client
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProfileStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProfile:
      type: object
      required: [object_kind, kind, key, display_name]
      properties:
        tenant_id:
          type: string
          format: uuid
        object_kind:
          type: string
          enum: [entity, resource, group, tenant, credential]
        kind:
          type: string
          example: device
        key:
          type: string
          example: client
        display_name:
          type: string
          example: Client
        description:
          type: string
        status:
          $ref: '#/components/schemas/ProfileStatus'

    ProfileVersion:
      type: object
      required: [id, profile_id, version, json_schema, ui_schema, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        profile_id:
          type: string
          format: uuid
        version:
          type: integer
        json_schema:
          type: object
          default: {}
        ui_schema:
          type: object
          default: {}
        status:
          $ref: '#/components/schemas/ProfileVersionStatus'
        created_at:
          type: string
          format: date-time

    CreateProfileVersion:
      type: object
      required: [version]
      properties:
        version:
          type: integer
        json_schema:
          type: object
          default: {}
        ui_schema:
          type: object
          default: {}
        status:
          $ref: '#/components/schemas/ProfileVersionStatus'

    ProfileList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
        total:
          type: integer

    ProfileVersionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProfileVersion'

    # ── Credentials ────────────────────────────────────────────────────────

    Credential:
      type: object
      required: [id, kind, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: '#/components/schemas/CredentialKind'
        identifier:
          type: string
          nullable: true
          description: Username (password cred) or key prefix (API key)
        status:
          $ref: '#/components/schemas/CredentialStatus'
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CredentialList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Credential'

    CreateApiKey:
      type: object
      properties:
        expires_at:
          type: string
          format: date-time
          description: Omit for no expiry
        description:
          type: string
          example: device-01 production key

    ApiKeyResponse:
      type: object
      required: [credential_id, key]
      properties:
        credential_id:
          type: string
          format: uuid
        key:
          type: string
          description: >
            Full API key — format `atom_<32-hex-id>_<64-hex-secret>`.
            Shown exactly once. Store securely.
          example: atom_0a1b2c3d...
        expires_at:
          type: string
          format: date-time
          nullable: true

    # ── Groups ─────────────────────────────────────────────────────────────

    Group:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tenant_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateGroup:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: floor-sensors
        tenant_id:
          type: string
          format: uuid
        description:
          type: string

    GroupList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Group'
        total:
          type: integer

    AddMember:
      type: object
      required: [entity_id]
      properties:
        entity_id:
          type: string
          format: uuid

    MemberList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Entity'

    GroupIdList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: string
            format: uuid

    # ── Ownerships ─────────────────────────────────────────────────────────

    Ownership:
      type: object
      required: [owner_id, owned_id, relation, created_at]
      properties:
        owner_id:
          type: string
          format: uuid
        owned_id:
          type: string
          format: uuid
        relation:
          type: string
          default: owner
        created_at:
          type: string
          format: date-time

    CreateOwnership:
      type: object
      required: [owned_id]
      properties:
        owned_id:
          type: string
          format: uuid
        relation:
          type: string
          default: owner

    OwnedList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Entity'

    # ── Resources ──────────────────────────────────────────────────────────

    Resource:
      type: object
      required: [id, kind, attributes, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          example: channel
          description: Free-form kind string — e.g. channel, device, workspace
        name:
          type: string
          nullable: true
        tenant_id:
          type: string
          format: uuid
          nullable: true
        owner_id:
          type: string
          format: uuid
          nullable: true
        attributes:
          type: object
          description: Arbitrary JSONB metadata, usable in ABAC conditions
          example: {"env": "prod", "classification": "confidential"}
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateResource:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          example: channel
        name:
          type: string
        tenant_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        attributes:
          type: object

    UpdateResource:
      type: object
      properties:
        name:
          type: string
        attributes:
          type: object

    ResourceList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        total:
          type: integer

    # ── Roles ──────────────────────────────────────────────────────────────

    Role:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tenant_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateRole:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: channel-publisher
        tenant_id:
          type: string
          format: uuid
        description:
          type: string

    RoleList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        total:
          type: integer

    AddRoleCapability:
      type: object
      required: [capability_id]
      properties:
        capability_id:
          type: string
          format: uuid

    # ── Capabilities ───────────────────────────────────────────────────────

    Capability:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: publish
        resource_kind:
          type: string
          nullable: true
          description: >
            Scopes this capability to a specific resource kind.
            `null` means the capability applies to all resource kinds.
        description:
          type: string
          nullable: true

    CreateCapability:
      type: object
      required: [name]
      properties:
        name:
          type: string
        resource_kind:
          type: string
          description: Omit to create a capability that applies to all resource kinds
        description:
          type: string

    CapabilityList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Capability'

    # ── Policy bindings ────────────────────────────────────────────────────

    PolicyBinding:
      type: object
      required: [id, subject_kind, subject_id, grant_kind, grant_id, scope_kind, effect, conditions, created_at]
      properties:
        id:
          type: string
          format: uuid
        subject_kind:
          $ref: '#/components/schemas/SubjectKind'
        subject_id:
          type: string
          format: uuid
        grant_kind:
          $ref: '#/components/schemas/GrantKind'
        grant_id:
          type: string
          format: uuid
        scope_kind:
          $ref: '#/components/schemas/ScopeKind'
        scope_ref:
          type: string
          nullable: true
          description: Kind name or resource UUID depending on `scope_kind`
        effect:
          $ref: '#/components/schemas/Effect'
        conditions:
          type: object
          description: >
            Flat dot-path ABAC conditions. All entries must match (AND logic).
            Keys: `entity.attributes.<k>`, `resource.attributes.<k>`, `context.<k>`.
            Empty object `{}` means no conditions.
          example: {"resource.attributes.env": "prod", "context.ip_trusted": "true"}
        created_at:
          type: string
          format: date-time

    CreatePolicyBinding:
      type: object
      required: [subject_kind, subject_id, grant_kind, grant_id, scope_kind]
      properties:
        subject_kind:
          $ref: '#/components/schemas/SubjectKind'
        subject_id:
          type: string
          format: uuid
        grant_kind:
          $ref: '#/components/schemas/GrantKind'
        grant_id:
          type: string
          format: uuid
        scope_kind:
          $ref: '#/components/schemas/ScopeKind'
        scope_ref:
          type: string
          description: >
            For `scope_kind=resource`: resource UUID.
            For `scope_kind=resource_kind`: kind name string.
            For `scope_kind=all`: omit.
        effect:
          $ref: '#/components/schemas/Effect'
        conditions:
          type: object
          example: {}

    PolicyList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PolicyBinding'
        total:
          type: integer

    # ── Authorization check ────────────────────────────────────────────────

    AuthzRequest:
      type: object
      required: [subject_id, action]
      description: |
        At least one of `resource_id` or (`object_kind` + `object_id`) must
        be supplied. When both are present, the explicit object form wins.
      properties:
        subject_id:
          type: string
          format: uuid
        action:
          type: string
          description: Capability name to check
          example: publish
        resource_id:
          type: string
          format: uuid
          description: Legacy form. Resolves the protected object from `resources`.
        object_kind:
          type: string
          enum: [resource, tenant]
          description: |
            Explicit form. `resource` resolves from the `resources` table
            (same as `resource_id`); `tenant` resolves from the `tenants`
            table with kind = `"tenant"`.
        object_id:
          type: string
          format: uuid
          description: UUID of the protected object identified by `object_kind`.
        context:
          type: object
          description: >
            Optional extra fields injected into the ABAC evaluation context
            under the `context` key. Values can be any JSON type.
          example: {"ip_trusted": "true"}

    AuthzResponse:
      type: object
      required: [allowed, reason]
      properties:
        allowed:
          type: boolean
        reason:
          type: string
          enum:
            - allowed
            - no matching allow policy
            - subject not found
            - subject is not active
            - resource not found
            - tenant not found
            - "unknown action '<name>'"
            - "explicitly denied by policy <id>"

    # ── Tenants ───────────────────────────────────────────────────────────

    TenantStatus:
      type: string
      enum: [active, inactive, frozen, deleted]
      default: active

    Tenant:
      type: object
      required: [id, name, status, tags, attributes, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        route:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TenantStatus'
        tags:
          type: array
          items:
            type: string
        attributes:
          type: object
          description: Arbitrary JSONB metadata; reusable for Magistrala domain metadata.
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTenant:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: factory-1
        route:
          type: string
        tags:
          type: array
          items:
            type: string
        attributes:
          type: object

    UpdateTenant:
      type: object
      properties:
        name:
          type: string
        route:
          type: string
        tags:
          type: array
          items:
            type: string
        attributes:
          type: object
          description: Replaces all existing attributes when provided

    TenantList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        total:
          type: integer

  # ── Reusable responses ───────────────────────────────────────────────────

  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: missing Authorization header

    Forbidden:
      description: Caller lacks `manage` scope=all
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: forbidden

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not found

    Conflict:
      description: Already exists (unique constraint)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: already exists

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ── Health ─────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is healthy and database is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── JWKS ───────────────────────────────────────────────────────────────

  /.well-known/jwks.json:
    get:
      operationId: getJwks
      summary: JWKS public keys
      description: >
        Returns the active ES256 public keys for external JWT verification.
        Always includes the primary key and the standby key (if present).
        Cache with a short TTL; re-fetch on unknown `kid`.
      tags: [Auth]
      security: []
      responses:
        "200":
          description: JWKS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'

  # ── Auth ───────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      summary: Authenticate with a password and receive a JWT
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              identifier: alice
              secret: s3cr3t
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session
      description: Immediately invalidates the JWT associated with the current session.
      tags: [Auth]
      responses:
        "204":
          description: Session revoked
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions/{id}:
    get:
      operationId: getSession
      summary: Get session details
      tags: [Auth]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /auth/keys/rotate:
    post:
      operationId: rotateKeys
      summary: Rotate ES256 signing keys
      description: >
        **RequireManage.** Generates a new primary key, demotes the current primary to standby,
        and retires the previous standby — all in a single transaction.
        Outstanding tokens remain valid under the standby key until they expire.
        The in-process key store is updated immediately; no restart required.
      tags: [Auth]
      responses:
        "204":
          description: Keys rotated
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

