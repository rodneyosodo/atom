services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-atom}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 5

  atom:
    image: ${ATOM_IMAGE:-ghcr.io/absmach/atom:latest}
    build:
      context: .
      target: release
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-atom}
      LISTEN_ADDR: 0.0.0.0:8080
      GRPC_ADDR: 0.0.0.0:8081
      ATOM_DB_MAX_CONNECTIONS: ${ATOM_DB_MAX_CONNECTIONS:-20}
      ATOM_DB_MIN_CONNECTIONS: ${ATOM_DB_MIN_CONNECTIONS:-0}
      ATOM_DB_ACQUIRE_TIMEOUT_SECS: ${ATOM_DB_ACQUIRE_TIMEOUT_SECS:-30}
      ATOM_DB_CONNECT_TIMEOUT_SECS: ${ATOM_DB_CONNECT_TIMEOUT_SECS:-10}
      ATOM_DB_IDLE_TIMEOUT_SECS: ${ATOM_DB_IDLE_TIMEOUT_SECS:-600}
      ATOM_DB_MAX_LIFETIME_SECS: ${ATOM_DB_MAX_LIFETIME_SECS:-1800}
      JWT_EXPIRY_SECS: 3600
      ADMIN_SECRET: ${ADMIN_SECRET:?set ADMIN_SECRET}
      ATOM_KEY_ENCRYPTION_KEY: ${ATOM_KEY_ENCRYPTION_KEY:?set ATOM_KEY_ENCRYPTION_KEY}
      ATOM_KEY_ENCRYPTION_KEY_ID: ${ATOM_KEY_ENCRYPTION_KEY_ID:-local:v1}
      ATOM_ALLOW_PLAINTEXT_SIGNING_KEYS: ${ATOM_ALLOW_PLAINTEXT_SIGNING_KEYS:-false}
      ATOM_AUDIT_RETENTION_DAYS: ${ATOM_AUDIT_RETENTION_DAYS:-365}
      ATOM_AUDIT_RETENTION_ENABLED: ${ATOM_AUDIT_RETENTION_ENABLED:-true}
      ATOM_AUDIT_CLEANUP_INTERVAL_SECS: ${ATOM_AUDIT_CLEANUP_INTERVAL_SECS:-86400}
      ATOM_AUDIT_CLEANUP_BATCH_SIZE: ${ATOM_AUDIT_CLEANUP_BATCH_SIZE:-5000}
      ATOM_LOGIN_FAILURE_LIMIT: ${ATOM_LOGIN_FAILURE_LIMIT:-5}
      ATOM_LOGIN_FAILURE_WINDOW_SECS: ${ATOM_LOGIN_FAILURE_WINDOW_SECS:-900}
      ATOM_TRUSTED_PROXY_CIDRS: ${ATOM_TRUSTED_PROXY_CIDRS:-}
      ATOM_GRAPHQL_INTROSPECTION_ENABLED: ${ATOM_GRAPHQL_INTROSPECTION_ENABLED:-false}
      ATOM_METRICS_ENABLED: ${ATOM_METRICS_ENABLED:-true}
      ATOM_GRPC_TLS_CERT_PATH: ${ATOM_GRPC_TLS_CERT_PATH:-}
      ATOM_GRPC_TLS_KEY_PATH: ${ATOM_GRPC_TLS_KEY_PATH:-}
      ATOM_GRPC_TLS_CLIENT_CA_PATH: ${ATOM_GRPC_TLS_CLIENT_CA_PATH:-}
      ATOM_CERTS_ENABLED: ${ATOM_CERTS_ENABLED:-true}
      ATOM_CERTS_CA_MODE: ${ATOM_CERTS_CA_MODE:-file_intermediate_issuer}
      ATOM_CERTS_ROOT_CA_CERT_PATH: ${ATOM_CERTS_ROOT_CA_CERT_PATH:-/certs/root-ca.crt}
      ATOM_CERTS_INTERMEDIATE_CA_CERT_PATH: ${ATOM_CERTS_INTERMEDIATE_CA_CERT_PATH:-/certs/intermediate-ca.crt}
      ATOM_CERTS_INTERMEDIATE_CA_KEY_PATH: ${ATOM_CERTS_INTERMEDIATE_CA_KEY_PATH:-/certs/intermediate-ca.key}
      ATOM_CERTS_ROOT_CA_KEY_PATH: ${ATOM_CERTS_ROOT_CA_KEY_PATH:-}
      ATOM_CERTS_LEAF_DEFAULT_TTL_SECS: ${ATOM_CERTS_LEAF_DEFAULT_TTL_SECS:-2592000}
      ATOM_CERTS_LEAF_MAX_TTL_SECS: ${ATOM_CERTS_LEAF_MAX_TTL_SECS:-2592000}
      ATOM_MIN_PASSWORD_CHARS: ${ATOM_MIN_PASSWORD_CHARS:-12}
      ATOM_CORS_ALLOWED_ORIGINS: ${ATOM_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3005}
      ATOM_EMAIL_VERIFICATION_REDIRECT: ${ATOM_EMAIL_VERIFICATION_REDIRECT:-http://localhost:8080/auth/email/verify}
      ATOM_OAUTH_SUCCESS_REDIRECT: ${ATOM_OAUTH_SUCCESS_REDIRECT:-http://localhost:3005/auth/callback}
      ATOM_OAUTH_ERROR_REDIRECT: ${ATOM_OAUTH_ERROR_REDIRECT:-http://localhost:3005/auth/callback}
      ATOM_PASSWORD_RESET_REDIRECT: ${ATOM_PASSWORD_RESET_REDIRECT:-http://localhost:3005/reset-password}
      ATOM_INVITATION_REDIRECT: ${ATOM_INVITATION_REDIRECT:-http://localhost:3005/invitations/accept}
      ATOM_SELF_REGISTRATION_ENABLED: ${ATOM_SELF_REGISTRATION_ENABLED:-${ATOM_SIGNUP_ENABLED:-true}}
      ATOM_PUBLIC_BASE_URL: ${ATOM_PUBLIC_BASE_URL:-http://localhost:8080}
      ATOM_ALLOW_UNVERIFIED_EMAIL_LOGIN: "${ATOM_ALLOW_UNVERIFIED_EMAIL_LOGIN:-false}"
      ATOM_OIDC_PROVIDERS: ${ATOM_OIDC_PROVIDERS:-}
      RUST_LOG: info
    volumes:
      - ${ATOM_CERTS_CA_DIR:-./certs}:/certs:ro
    ports:
      - "${ATOM_HTTP_PORT:-8080}:8080"
      - "${ATOM_GRPC_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - default

  atom-dev:
    image: ${ATOM_DEV_IMAGE:-ghcr.io/absmach/atom:dev}
    build:
      context: .
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-atom}:${POSTGRES_PASSWORD:-atom-dev-only}@postgres:5432/${POSTGRES_DB:-atom}
      LISTEN_ADDR: 0.0.0.0:8080
      GRPC_ADDR: 0.0.0.0:8081
      ATOM_DB_MAX_CONNECTIONS: ${ATOM_DB_MAX_CONNECTIONS:-20}
      ATOM_DB_MIN_CONNECTIONS: ${ATOM_DB_MIN_CONNECTIONS:-0}
      ATOM_DB_ACQUIRE_TIMEOUT_SECS: ${ATOM_DB_ACQUIRE_TIMEOUT_SECS:-30}
      ATOM_DB_CONNECT_TIMEOUT_SECS: ${ATOM_DB_CONNECT_TIMEOUT_SECS:-10}
      ATOM_DB_IDLE_TIMEOUT_SECS: ${ATOM_DB_IDLE_TIMEOUT_SECS:-600}
      ATOM_DB_MAX_LIFETIME_SECS: ${ATOM_DB_MAX_LIFETIME_SECS:-1800}
      JWT_EXPIRY_SECS: 3600
      ADMIN_SECRET: ${ADMIN_SECRET:-atom-dev-admin-password}
      ATOM_KEY_ENCRYPTION_KEY: ${ATOM_KEY_ENCRYPTION_KEY:-}
      ATOM_KEY_ENCRYPTION_KEY_ID: ${ATOM_KEY_ENCRYPTION_KEY_ID:-local:v1}
      ATOM_ALLOW_PLAINTEXT_SIGNING_KEYS: ${ATOM_ALLOW_PLAINTEXT_SIGNING_KEYS:-true}
      ATOM_AUDIT_RETENTION_DAYS: ${ATOM_AUDIT_RETENTION_DAYS:-365}
      ATOM_AUDIT_RETENTION_ENABLED: ${ATOM_AUDIT_RETENTION_ENABLED:-true}
      ATOM_AUDIT_CLEANUP_INTERVAL_SECS: ${ATOM_AUDIT_CLEANUP_INTERVAL_SECS:-86400}
      ATOM_AUDIT_CLEANUP_BATCH_SIZE: ${ATOM_AUDIT_CLEANUP_BATCH_SIZE:-5000}
      ATOM_LOGIN_FAILURE_LIMIT: ${ATOM_LOGIN_FAILURE_LIMIT:-5}
      ATOM_LOGIN_FAILURE_WINDOW_SECS: ${ATOM_LOGIN_FAILURE_WINDOW_SECS:-900}
      ATOM_TRUSTED_PROXY_CIDRS: ${ATOM_TRUSTED_PROXY_CIDRS:-}
      ATOM_GRAPHQL_INTROSPECTION_ENABLED: ${ATOM_GRAPHQL_INTROSPECTION_ENABLED:-true}
      ATOM_METRICS_ENABLED: ${ATOM_METRICS_ENABLED:-true}
      ATOM_GRPC_TLS_CERT_PATH: ${ATOM_GRPC_TLS_CERT_PATH:-}
      ATOM_GRPC_TLS_KEY_PATH: ${ATOM_GRPC_TLS_KEY_PATH:-}
      ATOM_GRPC_TLS_CLIENT_CA_PATH: ${ATOM_GRPC_TLS_CLIENT_CA_PATH:-}
      ATOM_CERTS_ENABLED: ${ATOM_CERTS_ENABLED:-true}
      ATOM_CERTS_CA_MODE: ${ATOM_CERTS_CA_MODE:-file_intermediate_issuer}
      ATOM_CERTS_ROOT_CA_CERT_PATH: ${ATOM_CERTS_ROOT_CA_CERT_PATH:-/certs/root-ca.crt}
      ATOM_CERTS_INTERMEDIATE_CA_CERT_PATH: ${ATOM_CERTS_INTERMEDIATE_CA_CERT_PATH:-/certs/intermediate-ca.crt}
      ATOM_CERTS_INTERMEDIATE_CA_KEY_PATH: ${ATOM_CERTS_INTERMEDIATE_CA_KEY_PATH:-/certs/intermediate-ca.key}
      ATOM_CERTS_ROOT_CA_KEY_PATH: ${ATOM_CERTS_ROOT_CA_KEY_PATH:-}
      ATOM_CERTS_LEAF_DEFAULT_TTL_SECS: ${ATOM_CERTS_LEAF_DEFAULT_TTL_SECS:-2592000}
      ATOM_CERTS_LEAF_MAX_TTL_SECS: ${ATOM_CERTS_LEAF_MAX_TTL_SECS:-2592000}
      ATOM_MIN_PASSWORD_CHARS: ${ATOM_MIN_PASSWORD_CHARS:-12}
      ATOM_CORS_ALLOWED_ORIGINS: ${ATOM_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3005}
      ATOM_PUBLIC_BASE_URL: ${ATOM_PUBLIC_BASE_URL:-http://localhost:8081}
      ATOM_EMAIL_VERIFICATION_REDIRECT: ${ATOM_EMAIL_VERIFICATION_REDIRECT:-http://localhost:8081/auth/email/verify}
      ATOM_OAUTH_SUCCESS_REDIRECT: ${ATOM_OAUTH_SUCCESS_REDIRECT:-http://localhost:3005/auth/callback}
      ATOM_OAUTH_ERROR_REDIRECT: ${ATOM_OAUTH_ERROR_REDIRECT:-http://localhost:3005/auth/callback}
      ATOM_PASSWORD_RESET_REDIRECT: ${ATOM_PASSWORD_RESET_REDIRECT:-http://localhost:3005/reset-password}
      ATOM_INVITATION_REDIRECT: ${ATOM_INVITATION_REDIRECT:-http://localhost:3005/invitations/accept}
      ATOM_SELF_REGISTRATION_ENABLED: ${ATOM_SELF_REGISTRATION_ENABLED:-${ATOM_SIGNUP_ENABLED:-true}}
      ATOM_ALLOW_UNVERIFIED_EMAIL_LOGIN: "${ATOM_ALLOW_UNVERIFIED_EMAIL_LOGIN:-false}"
      ATOM_OIDC_PROVIDERS: ${ATOM_OIDC_PROVIDERS:-}
      RUST_LOG: info
    volumes:
      - ${ATOM_CERTS_CA_DIR:-./certs}:/certs:ro
    ports:
      - "${ATOM_DEV_HTTP_PORT:-8081}:8080"
      - "${ATOM_DEV_GRPC_PORT:-18081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - dev

  atom-ui:
    image: ${ATOM_UI_IMAGE:-ghcr.io/absmach/atom-ui:latest}
    build:
      context: ./app
    depends_on:
      - atom
    environment:
      ATOM_GRAPHQL_URL: ${ATOM_GRAPHQL_URL:-http://atom:8080/graphql}
      ATOM_UI_REGISTRATION_ENABLED: ${ATOM_UI_REGISTRATION_ENABLED:-true}
      ATOM_UI_FORWARD_CLIENT_IP_HEADERS: ${ATOM_UI_FORWARD_CLIENT_IP_HEADERS:-false}
    ports:
      - "${ATOM_UI_HTTP_PORT:-3005}:3000"
    profiles:
      - atom-ui

volumes:
  postgres_data:
